apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyage-mlops-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: voyage-mlops-app
  template:
    metadata:
      labels:
        app: voyage-mlops-app
    spec:
      containers:
      - name: voyage-mlops-container
        image: allan122/voyage_mlops_app:latest
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: voyage-mlops-service
spec:
  type: LoadBalancer
  selector:
    app: voyage-mlops-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501